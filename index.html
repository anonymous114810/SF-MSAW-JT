<!DOCTYPE html>
<html>
<head>
    <title>Audio Watermarking Demo</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #ddd; padding: 10px; text-align: center; }
        audio { width: 200px; }
    </style>
</head>
<body>
    <h1>论文题目：Deep Audio Watermarking...</h1>
    <table>
        <tr>
            <th>Sample ID</th>
            <th>Original Audio</th>
            <th>Watermarked</th>
            <th>Difference (x10 gain)</th>
        </tr>
        <tr>
            <td>001</td>
            <td><audio controls src="audio/001_orig.wav"></audio></td>
            <td><audio controls src="audio/001_wm.wav"></audio></td>
            <td><audio controls src="audio/001_diff.wav"></audio></td>
        </tr>
    </table>
</body>
</html>
